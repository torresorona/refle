# SOC 2 Trust Services Criteria — seed catalog (subset of the Common Criteria).
# Loaded into the `frameworks` / `controls` tables by the Phase 1 seeder.
# This is a representative starter set, not the complete TSC.
framework:
  key: soc2
  name: SOC 2 (Trust Services Criteria)
  version: "2017 (rev. 2022)"

controls:
  - code: CC1.1
    category: Control Environment
    title: Commitment to integrity and ethical values
    description: >
      The entity demonstrates a commitment to integrity and ethical values
      through its code of conduct and tone at the top.
  - code: CC2.1
    category: Communication and Information
    title: Quality information for internal control
    description: >
      The entity obtains or generates and uses relevant, quality information to
      support the functioning of internal control.
  - code: CC5.2
    category: Control Activities
    title: Control activities over technology
    description: >
      The entity selects and develops general control activities over technology
      to support the achievement of objectives.
  - code: CC6.1
    category: Logical and Physical Access
    title: Logical access security
    description: >
      The entity implements logical access security software, infrastructure, and
      architectures over protected information assets.
  - code: CC6.2
    category: Logical and Physical Access
    title: User access provisioning and de-provisioning
    description: >
      Prior to issuing system credentials, the entity registers and authorizes new
      users; credentials are removed when access is no longer required.
  - code: CC6.3
    category: Logical and Physical Access
    title: Role-based access and least privilege
    description: >
      The entity authorizes, modifies, or removes access based on roles and the
      principle of least privilege.
  - code: CC6.6
    category: Logical and Physical Access
    title: Boundary protection
    description: >
      The entity implements controls to protect against threats from sources
      outside its system boundaries.
  - code: CC6.7
    category: Logical and Physical Access
    title: Encryption of data in transit
    description: >
      The entity restricts the transmission of data and protects it using
      encryption during transmission.
  - code: CC7.2
    category: System Operations
    title: Security monitoring
    description: >
      The entity monitors system components for anomalies indicative of malicious
      acts, natural disasters, and errors.
  - code: CC8.1
    category: Change Management
    title: Change management
    description: >
      The entity authorizes, designs, develops, tests, approves, and implements
      changes to infrastructure, data, and software.
